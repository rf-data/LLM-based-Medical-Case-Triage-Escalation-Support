services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    privileged: true
    ports:
      - "8800:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

  # evidently:
  #   image: evidentlyai/evidently:latest
  #   container_name: evidently
  #   ports:
  #     - "8000:8000"
  #   command: evidently ui --host 0.0.0.0 --port 8000
  #   restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    restart: always
    env_file:
      - .env.monitoring
    depends_on:
      # loki:
      #   condition: service_healthy
      prometheus:
        condition: service_started

  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yaml
    restart: always
    # healthcheck:    --> nutzlos
    #   test: [ "CMD", "curl", "-sf", "http://localhost:3100/ready" ]
    #   interval: 10s
    #   timeout: 3s
    #   retries: 5
    #   start_period: 20s
    # depends_on:
    #   - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/run/docker/netns/.+)$'
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
      - ./monitoring/prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: always
    # depends_on:
    #   service_1:
    #     condition: service_healthy

  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    volumes:
      # - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./mlflow/logs:/mlflow/logs:ro
      - ./logs:/logs:ro
      # - /etc/promtail:/etc/promtail
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail/promtail.yaml:/etc/promtail/promtail.yaml:ro
    command: -config.file=/etc/promtail/promtail.yaml
    restart: always
    depends_on:
      - loki

volumes:
  grafana-data:
  prometheus_data:
  loki_data:


networks:
  default:
    driver: bridge
    name: LLM_escalation
