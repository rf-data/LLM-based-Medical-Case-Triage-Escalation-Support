global:
  scrape_interval: 5s
  evaluation_interval: 15s 

rule_files:
  - "rules/*.yaml"
  - "rules/*.yml"

scrape_configs:
  - job_name: 'prometheus' 
    static_configs:
      - targets: ['prometheus:9090']

  # - job_name: 'bike_api'
  #   static_configs:
  #     - targets: ['bike-api:8080']
    
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
