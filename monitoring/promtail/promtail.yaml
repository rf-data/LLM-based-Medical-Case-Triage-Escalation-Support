server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # - job_name: docker
  #   docker_sd_configs:
  #     - host: unix:///var/run/docker.sock
  #   relabel_configs:
  #     - source_labels: [__meta_docker_container_name]
  #       target_label: container
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log 

  - job_name: MLflow
    static_configs:
      - targets:
          - localhost
        labels:
          job: mlflow
          service: mlflow
          __path__: /mlflow/logs/*.log
  
  - job_name: local_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: script_logs
          source: filesystem
          __path__: /logs/*.log
